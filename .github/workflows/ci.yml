name: CI

on:
  pull_request:
    paths:
      - tf/**
      - .github/workflows/**
  push:
    branches:
      - main
    paths:
      - tf/**
      - .github/workflows/**

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    uses: glitchedmob/infra-gha/.github/workflows/tf-validate.yml@main
    with:
      working-directory: tf
    secrets:
      aws_role_arn: ${{ secrets.AWS_GHA_TERRAFORM_ROLE_ARN }}
